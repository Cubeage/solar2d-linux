name: Build Solar2DBuilder for Linux

on:
  workflow_dispatch:
    inputs:
      solar2d_build:
        description: 'Solar2D build number (e.g. 3728)'
        required: true
        default: '3728'
      solar2d_year:
        description: 'Solar2D year (e.g. 2026)'
        required: true
        default: '2026'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Extract Android templates from official macOS DMG
  # ──────────────────────────────────────────────────────────────
  extract-android-templates:
    name: Extract Android Templates (macOS)
    runs-on: [self-hosted, sylphx, macos, standard]
    steps:
      - name: Download Solar2D macOS DMG
        run: |
          BUILD=${{ github.event.inputs.solar2d_build }}
          YEAR=${{ github.event.inputs.solar2d_year }}
          echo "Downloading Solar2D-macOS-${YEAR}.${BUILD}.dmg..."
          curl -L "https://github.com/coronalabs/corona/releases/download/${BUILD}/Solar2D-macOS-${YEAR}.${BUILD}.dmg" \
            -o /tmp/Solar2D.dmg --show-error

      - name: Mount DMG and extract Android templates
        run: |
          BUILD=${{ github.event.inputs.solar2d_build }}
          hdiutil attach /tmp/Solar2D.dmg -mountpoint /tmp/S2D -noautoopen -nobrowse -quiet
          NATIVE_DIR="/tmp/S2D/Corona-${BUILD}/Native/Corona/android"
          echo "Android templates found:"
          ls "$NATIVE_DIR/lib/gradle/" "$NATIVE_DIR/resource/"
          mkdir -p /tmp/android-templates
          cp "$NATIVE_DIR/lib/gradle/Corona.aar"              /tmp/android-templates/
          cp "$NATIVE_DIR/resource/android-template.zip"      /tmp/android-templates/
          hdiutil detach /tmp/S2D -quiet
          echo "Extracted:"
          ls -lh /tmp/android-templates/

      - name: Upload Android templates artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-templates
          path: /tmp/android-templates/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build Solar2DBuilder from source on Linux
  # ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Solar2DBuilder (Linux)
    runs-on: ubuntu-22.04
    needs: extract-android-templates
    env:
      BUILD: ${{ github.event.inputs.solar2d_build }}
      YEAR: ${{ github.event.inputs.solar2d_year }}
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            openjdk-17-jdk-headless \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libopenal-dev \
            libpng-dev \
            libjpeg-dev \
            libssl-dev \
            libvorbis-dev \
            libogg-dev \
            uuid-dev \
            zlib1g-dev \
            libsdl2-dev \
            git

          # libtinfo5 needed by some Solar2D tools (not in 22.04 by default)
          sudo apt-get install -y libtinfo5 2>/dev/null || \
            sudo apt-get install -y libtinfo6 || true

      - name: Clone Solar2D source at tag ${{ env.BUILD }}
        run: |
          git clone --recursive --depth 1 --branch "$BUILD" \
            https://github.com/coronalabs/corona.git solar2d-src
          echo "Cloned Solar2D at tag $BUILD"

      - name: Build Solar2DBuilder with CMake
        run: |
          cd solar2d-src/platform/linux
          mkdir -p build && cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/solar2d-install
          # Build only Solar2DBuilder target (skip simulator/GUI)
          ninja Solar2DBuilder
          echo "Build complete:"
          ls -lh Solar2DBuilder

      - name: Install Solar2DBuilder
        run: |
          cd solar2d-src/platform/linux/build
          sudo ninja install 2>/dev/null || true
          # Also copy manually
          mkdir -p /tmp/solar2d-install/bin/Solar2D
          cp Solar2DBuilder /tmp/solar2d-install/bin/Solar2D/
          echo "Solar2DBuilder at /tmp/solar2d-install/bin/Solar2D/Solar2DBuilder"
          ls -lh /tmp/solar2d-install/bin/Solar2D/

      - name: Download Android templates artifact
        uses: actions/download-artifact@v4
        with:
          name: android-templates
          path: /tmp/android-templates

      - name: Package Solar2DBuilder + Android templates
        run: |
          BUILD=${{ github.event.inputs.solar2d_build }}
          YEAR=${{ github.event.inputs.solar2d_year }}
          PKG_DIR="/tmp/solar2d-linux-${BUILD}"
          mkdir -p "${PKG_DIR}/Resources"

          # Binary
          cp /tmp/solar2d-install/bin/Solar2D/Solar2DBuilder "${PKG_DIR}/"
          chmod +x "${PKG_DIR}/Solar2DBuilder"

          # Android templates alongside binary (Solar2DBuilder looks relative to itself)
          cp /tmp/android-templates/android-template.zip "${PKG_DIR}/Resources/"
          cp /tmp/android-templates/Corona.aar            "${PKG_DIR}/Resources/"

          # Also copy resources from source (Lua scripts, etc.)
          RESOURCES_SRC="solar2d-src/platform/resources"
          if [ -d "$RESOURCES_SRC" ]; then
            cp -r "$RESOURCES_SRC"/. "${PKG_DIR}/Resources/"
          fi

          echo "Package contents:"
          find "${PKG_DIR}" -type f | sort

          # Create tarball
          cd /tmp
          tar -czf "solar2dbuilder-linux-${BUILD}.tar.gz" "solar2d-linux-${BUILD}"
          ls -lh "solar2dbuilder-linux-${BUILD}.tar.gz"
          echo "PKG_NAME=solar2dbuilder-linux-${BUILD}.tar.gz" >> $GITHUB_ENV
          echo "PKG_PATH=/tmp/solar2dbuilder-linux-${BUILD}.tar.gz" >> $GITHUB_ENV
          echo "TAG=${YEAR}.${BUILD}" >> $GITHUB_ENV

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar2dbuilder-linux
          path: ${{ env.PKG_PATH }}

  # ──────────────────────────────────────────────────────────────
  # Job 3: Publish to GitHub Releases
  # ──────────────────────────────────────────────────────────────
  publish:
    name: Publish to GitHub Releases
    runs-on: ubuntu-22.04
    needs: build-linux
    env:
      BUILD: ${{ github.event.inputs.solar2d_build }}
      YEAR: ${{ github.event.inputs.solar2d_year }}
    steps:
      - name: Download Solar2DBuilder artifact
        uses: actions/download-artifact@v4
        with:
          name: solar2dbuilder-linux
          path: /tmp/release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.YEAR }}.${{ env.BUILD }}
          name: Solar2DBuilder Linux ${{ env.YEAR }}.${{ env.BUILD }}
          body: |
            Linux build of Solar2DBuilder for Android APK CI builds.
            
            Built from Solar2D ${{ env.YEAR }}.${{ env.BUILD }} source.
            Android templates extracted from official macOS DMG.
            
            ## Usage
            ```bash
            curl -L https://github.com/Cubeage/solar2d-linux/releases/download/${{ env.YEAR }}.${{ env.BUILD }}/solar2dbuilder-linux-${{ env.BUILD }}.tar.gz | tar -xz
            cd solar2d-linux-${{ env.BUILD }}
            ./Solar2DBuilder build --lua recipe-android.lua
            ```
          files: /tmp/release/*.tar.gz
